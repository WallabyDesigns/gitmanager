x-app-volumes: &app-volumes
  - ./.env:/var/www/html/.env:ro
  - storage:/var/www/html/storage
  - database:/var/www/html/database

services:
  app:
    build:
      context: .
      target: app
    environment:
      CONTAINER_ROLE: app
      RUN_MIGRATIONS: "true"
    volumes: *app-volumes
    restart: unless-stopped

  web:
    build:
      context: .
      target: nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - storage:/var/www/html/storage:ro
    depends_on:
      - app
    restart: unless-stopped

  queue:
    build:
      context: .
      target: app
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=1", "--timeout=0"]
    environment:
      CONTAINER_ROLE: queue
    volumes: *app-volumes
    depends_on:
      - app
    restart: unless-stopped

  scheduler:
    build:
      context: .
      target: app
    command: ["php", "artisan", "schedule:work"]
    environment:
      CONTAINER_ROLE: scheduler
    volumes: *app-volumes
    depends_on:
      - app
    restart: unless-stopped

volumes:
  storage:
  database:
